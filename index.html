<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pomodoro — Swiftry</title>
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg, #f5f5f7);
      color: var(--fg, #111827);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      transition: background .2s ease, color .2s ease;
    }

    .card {
      width: 100%;
      max-width: 280px;
      background: var(--card-bg, #ffffff);
      border-radius: 18px;
      padding: 18px 16px 14px;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.02),
        0 8px 24px rgba(0,0,0,0.06);
      transition: background .2s ease;
    }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex;
      gap: 6px;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 2px;
    }
    .tab {
      flex: 1;
      appearance: none;
      background: transparent;
      border: 0;
      padding: 8px 4px;
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--tab-fg, #6b7280);
      cursor: pointer;
      border-radius: 10px;
      position: relative;
      transition: color .15s ease, background .15s ease;
    }
    .tab:hover { color: var(--tab-fg-hover, #374151); }
    .tab[aria-selected="true"] {
      color: var(--fg, #111827);
      font-weight: 600;
    }
    .tab[aria-selected="true"]::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent, #06b6d4);
    }

    /* ---------- Timer ring ---------- */
    .ring {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 6px auto 10px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--card-bg, #ffffff) 0 58%, transparent 59%),
        conic-gradient(var(--ring-track, #e5e7eb) 0deg, var(--ring-track, #e5e7eb) 360deg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter .2s ease;
    }
    .ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--p,0) * 360deg), transparent 0);
      -webkit-mask: radial-gradient(circle, transparent 0 58%, #000 59%);
              mask: radial-gradient(circle, transparent 0 58%, #000 59%);
    }
    .ring.running { filter: drop-shadow(0 0 0.5px rgba(0,0,0,0.04)); }

    .display {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1;
    }
    .time {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--fg, #111827);
    }
    .mode {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--mode-fg, #4b5563);
    }
    .mode .dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--accent, #06b6d4);
    }

    /* ---------- Controls ---------- */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 4px;
    }
    .btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: var(--btn-bg, #ffffff);
      border: 1px solid var(--btn-border, #e5e7eb);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background .15s ease, border-color .15s ease, transform .05s ease;
      color: var(--fg, #111827);
    }
    .btn:hover  { background: var(--btn-bg-hover, #f9fafb); border-color: var(--btn-border-hover, #d1d5db); }
    .btn:active { transform: scale(0.96); }
    .btn svg    { width: 16px; height: 16px; display: block; }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 10.5px;
      color: var(--footer-fg, #9ca3af);
    }
    .footer a {
      color: inherit;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 240px) {
      .ring   { width: 150px; height: 150px; }
      .time   { font-size: 36px; }
    }

    @keyframes alarm-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.00); }
      50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0.22); }
    }
    .ring.ringing {
      animation: alarm-pulse 1.1s ease-in-out infinite;
    }
    .ring.ringing .mode .dot {
      background: #ef4444 !important;
      animation: alarm-pulse 1.1s ease-in-out infinite;
    }

    /* ---------- Themes ---------- */
    body.theme-light {
      --bg: #f5f5f7;
      --fg: #111827;
      --card-bg: #ffffff;
      --tab-fg: #6b7280;
      --tab-fg-hover: #374151;
      --ring-track: #e5e7eb;
      --mode-fg: #4b5563;
      --btn-bg: #ffffff;
      --btn-border: #e5e7eb;
      --btn-bg-hover: #f9fafb;
      --btn-border-hover: #d1d5db;
      --footer-fg: #9ca3af;
    }
    body.theme-dark {
      --bg: #0f1115;
      --fg: #f3f4f6;
      --card-bg: #1a1d24;
      --tab-fg: #9ca3af;
      --tab-fg-hover: #d1d5db;
      --ring-track: #2a2e37;
      --mode-fg: #9ca3af;
      --btn-bg: #1f2330;
      --btn-border: #2f343f;
      --btn-bg-hover: #262b38;
      --btn-border-hover: #3a4150;
      --footer-fg: #6b7280;
    }
    body.theme-sunset {
      --bg: #fdf1e7;
      --fg: #4a2c1d;
      --card-bg: #fffaf3;
      --tab-fg: #b9805f;
      --tab-fg-hover: #8a5a3d;
      --ring-track: #f3ddc4;
      --mode-fg: #a06b4a;
      --btn-bg: #fffaf3;
      --btn-border: #f0d9bd;
      --btn-bg-hover: #fcefdd;
      --btn-border-hover: #e8c7a0;
      --footer-fg: #c4a181;
    }
  </style>
</head>
<body class="theme-light">
  <main class="card" role="region" aria-label="Pomodoro timer">
    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab" role="tab" data-mode="pomodoro"  aria-selected="true">Pomodoro</button>
      <button class="tab" role="tab" data-mode="short"     aria-selected="false">Short Break</button>
      <button class="tab" role="tab" data-mode="long"      aria-selected="false">Long Break</button>
    </div>

    <!-- Ring + display -->
    <div class="ring" id="ring" style="--accent:#06b6d4;">
      <div class="display">
        <div class="time" id="time">25:00</div>
        <div class="mode"><span class="dot"></span><span id="modeLabel">work</span></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" id="playBtn" aria-label="Start">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14Z"/>
        </svg>
      </button>
      <button class="btn" id="resetBtn" aria-label="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="8"/>
        </svg>
      </button>
    </div>

    <div class="footer">
      <a href="#" id="powered" tabindex="-1">Powered by Swiftry</a>
    </div>
  </main>

  <script>
    /* =====================================================================
       Pomodoro Widget — Swiftry
       Configurable via URL query params:
         ?duration=25      → work session length in minutes (default 25)
         &theme=light       → light | dark | sunset (default light)
         &accent=%2306b6d4  → hex color, URL-encoded # as %23 (default cyan)
         &sound=chime       → chime | bell | alarm | off (default chime)
         &autostart=true    → true | false — auto-start the timer on load
       Example embed URL:
         index.html?duration=45&theme=dark&accent=%23ff6b6b&sound=bell&autostart=true
       ===================================================================== */
    (function () {
      // ---------- read & validate URL params ----------
      const params = new URLSearchParams(window.location.search);

      const clampInt = (v, min, max, fallback) => {
        const n = parseInt(v, 10);
        if (Number.isNaN(n)) return fallback;
        return Math.min(max, Math.max(min, n));
      };

      const VALID_THEMES = ["light", "dark", "sunset"];
      const VALID_SOUNDS = ["chime", "bell", "alarm", "off"];
      const HEX_RE = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i;

      const workMinutes = clampInt(params.get("duration"), 1, 180, 25);

      let theme = (params.get("theme") || "light").toLowerCase();
      if (!VALID_THEMES.includes(theme)) theme = "light";

      let accent = params.get("accent") || "#06b6d4";
      if (!HEX_RE.test(accent)) accent = "#06b6d4";

      let sound = (params.get("sound") || "chime").toLowerCase();
      if (!VALID_SOUNDS.includes(sound)) sound = "chime";

      const autostart = (params.get("autostart") || "false").toLowerCase() === "true";

      // ---------- apply theme ----------
      document.body.classList.remove("theme-light");
      document.body.classList.add("theme-" + theme);

      // ---------- modes ----------
      // Work session length is configurable; breaks scale proportionally
      // off the classic 25/5/15 Pomodoro ratio so a 50-min "duration" still
      // feels balanced (10-min short break, 30-min long break) rather than
      // forcing fixed 5/15-min breaks regardless of work length.
      const RATIO_SHORT = 5 / 25;
      const RATIO_LONG  = 15 / 25;

      const MODES = {
        pomodoro: { seconds: workMinutes * 60, label: "work",        color: accent },
        short:    { seconds: Math.round(workMinutes * RATIO_SHORT) * 60, label: "short break", color: "#22c55e" },
        long:     { seconds: Math.round(workMinutes * RATIO_LONG)  * 60, label: "long break",  color: "#a855f7" }
      };
      const LS_KEY = "swiftry-pomodoro-mode";

      const $time   = document.getElementById("time");
      const $mode   = document.getElementById("modeLabel");
      const $ring   = document.getElementById("ring");
      const $play   = document.getElementById("playBtn");
      const $reset  = document.getElementById("resetBtn");
      const $tabs   = Array.from(document.querySelectorAll(".tab"));

      const ICON_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14Z"/></svg>';
      const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7"  y="5" width="3.2" height="14" rx="1"/><rect x="13.8" y="5" width="3.2" height="14" rx="1"/></svg>';

      let state = "idle";           // 'idle' | 'running' | 'paused'
      let mode  = localStorage.getItem(LS_KEY) || "pomodoro";
      if (!MODES[mode]) mode = "pomodoro";
      let remaining = MODES[mode].seconds;
      let tickId = null;
      let endsAt = 0;

      // ---------- helpers ----------
      const fmt = (s) => {
        s = Math.max(0, Math.floor(s));
        const m = Math.floor(s / 60);
        const r = s % 60;
        return String(m).padStart(2, "0") + ":" + String(r).padStart(2, "0");
      };
      const setAccent = (hex) => {
        document.documentElement.style.setProperty("--accent", hex);
        $ring.style.setProperty("--accent", hex);
      };
      const render = () => {
        $time.textContent = fmt(remaining);
        $mode.textContent = MODES[mode].label;
        const total = MODES[mode].seconds;
        const p = total > 0 ? 1 - (remaining / total) : 1;
        $ring.style.setProperty("--p", p.toFixed(4));
        $ring.classList.toggle("running", state === "running");
      };
      const setPlayIcon = (running) => {
        $play.innerHTML = running ? ICON_PAUSE : ICON_PLAY;
        $play.setAttribute("aria-label", running ? "Pause" : "Start");
      };

      // ---------- mode switching ----------
      const switchMode = (next) => {
        if (!MODES[next] || next === mode) return;
        mode = next;
        localStorage.setItem(LS_KEY, mode);
        stopTick();
        stopRing();
        state = "idle";
        remaining = MODES[mode].seconds;
        setAccent(MODES[mode].color);
        $tabs.forEach(t => t.setAttribute(
          "aria-selected",
          String(t.dataset.mode === mode)
        ));
        setPlayIcon(false);
        render();
      };

      // ---------- tick loop (drift-free via endsAt) ----------
      const startTick = () => {
        stopTick();
        endsAt = Date.now() + remaining * 1000;
        state = "running";
        setPlayIcon(true);
        render();
        tickId = setInterval(() => {
          const left = Math.round((endsAt - Date.now()) / 1000);
          if (left <= 0) {
            remaining = 0;
            stopTick();
            onComplete();
            render();
            return;
          }
          remaining = left;
          render();
        }, 250);
      };
      const stopTick = () => {
        if (tickId) { clearInterval(tickId); tickId = null; }
      };

      // ---------- finish ----------
      const onComplete = () => {
        state = "idle";
        setPlayIcon(false);
        render();
        playSound();
      };

      // ---------- audio: three distinct generated sounds + off ----------
      let audioCtx   = null;
      let ringTimer  = null;

      const getCtx = () => {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      };

      const tone = (ctx, freq, startAt, dur, type, peakGain) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, startAt);
        g.gain.setValueAtTime(0.0001, startAt);
        g.gain.exponentialRampToValueAtTime(peakGain, startAt + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);
        o.connect(g).connect(ctx.destination);
        o.start(startAt);
        o.stop(startAt + dur + 0.02);
      };

      // chime: soft two-note ascending sine, single gentle burst, repeats slowly
      const burstChime = (ctx) => {
        const now = ctx.currentTime;
        tone(ctx, 784, now,         0.5, "sine", 0.3);  // G5
        tone(ctx, 1046, now + 0.18, 0.6, "sine", 0.28); // C6
      };

      // bell: bright triangle hit with a slight overtone, like a desk bell
      const burstBell = (ctx) => {
        const now = ctx.currentTime;
        tone(ctx, 1318, now, 0.9, "triangle", 0.35); // E6 fundamental
        tone(ctx, 2637, now, 0.5, "sine",     0.08); // octave overtone, quieter
      };

      // alarm: insistent square-wave triple beep (the original "Blocs" alarm)
      const burstAlarm = (ctx) => {
        const now = ctx.currentTime;
        [0, 0.28, 0.56].forEach((offset) => {
          tone(ctx, 988, now + offset, 0.22, "sine", 0.45);
        });
      };

      const SOUND_BURSTS = {
        chime: { fn: burstChime, interval: 2200 },
        bell:  { fn: burstBell,  interval: 1800 },
        alarm: { fn: burstAlarm, interval: 1400 }
      };

      const playSound = () => {
        stopRing();
        if (sound === "off") return; // visual pulse still happens via CSS class below
        try {
          const ctx = getCtx();
          const { fn, interval } = SOUND_BURSTS[sound];
          $ring.classList.add("ringing");
          fn(ctx);
          ringTimer = setInterval(() => fn(ctx), interval);
        } catch (_) { /* audio blocked — silently ignore */ }
      };

      const stopRing = () => {
        if (ringTimer) { clearInterval(ringTimer); ringTimer = null; }
        $ring.classList.remove("ringing");
      };

      // ---------- events ----------
      $play.addEventListener("click", () => {
        if (state === "running") {
          stopTick();
          state = "paused";
          setPlayIcon(false);
          render();
        } else {
          stopRing();
          startTick();
        }
      });

      $reset.addEventListener("click", () => {
        stopTick();
        stopRing();
        state = "idle";
        remaining = MODES[mode].seconds;
        setPlayIcon(false);
        render();
      });

      $tabs.forEach(t => t.addEventListener("click", () => switchMode(t.dataset.mode)));

      document.addEventListener("keydown", (e) => {
        if (e.target && /input|textarea/i.test(e.target.tagName)) return;
        if (e.code === "Space") { e.preventDefault(); $play.click(); }
        else if (e.key === "r" || e.key === "R") { $reset.click(); }
      });

      // ---------- boot ----------
      setAccent(MODES[mode].color);
      $tabs.forEach(t => t.setAttribute(
        "aria-selected",
        String(t.dataset.mode === mode)
      ));
      setPlayIcon(false);
      render();

      if (autostart) {
        // Browsers block AudioContext until a user gesture, so the very
        // first auto-started session may complete silently if the user
        // never interacted with the page — this is expected/unavoidable.
        startTick();
      }
    })();
  </script>
</body>
</html>
